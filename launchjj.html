<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VORTEX Telemetry</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="stylesheet" href="style.css">
</head>

<body class="dashboard">

<header>
    <h1>VORTEX LIVE TELEMETRY</h1>
</header>

<main class="grid">

<section class="card">
<h2>Powertrain</h2>
<canvas id="rpm"></canvas>
<canvas id="throttle"></canvas>
</section>

<section class="card">
<h2>Electrical</h2>
<canvas id="battery"></canvas>
</section>

<section class="card">
<h2>Suspension</h2>
<canvas id="suspension"></canvas>
</section>

<section class="card">
<h2>Brakes</h2>
<canvas id="brake"></canvas>
</section>

</main>

<script>

function createChart(id,label,max){
return new Chart(document.getElementById(id),{
type:'line',
data:{
labels:[],
datasets:[{
label:label,
data:[],
borderColor:'#7b2cff',
backgroundColor:'rgba(0,120,255,0.2)',
tension:0.4,
fill:true
}]
},
options:{
responsive:true,
plugins:{legend:{labels:{color:'white'}}},
scales:{
x:{ticks:{color:'white'}},
y:{min:0,max:max,ticks:{color:'white'}}
}
}
});
}

const rpm=createChart("rpm","RPM",12000);
const throttle=createChart("throttle","Throttle %",100);
const battery=createChart("battery","Battery Voltage",15);
const suspension=createChart("suspension","Suspension Travel (mm)",100);
const brake=createChart("brake","Brake Pressure (bar)",10);

function update(chart,value){
const time=new Date().toLocaleTimeString();

if(chart.data.labels.length>20){
chart.data.labels.shift();
chart.data.datasets[0].data.shift();
}

chart.data.labels.push(time);
chart.data.datasets[0].data.push(value);
chart.update();
}

setInterval(()=>{
update(rpm,7000+Math.random()*4000);
update(throttle,Math.random()*100);
update(battery,12+Math.random()*2);
update(suspension,Math.random()*80);
update(brake,Math.random()*8);
},1000);

</script>

</body>
</html>
