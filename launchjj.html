<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Telemetry Dashboard</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-main">

<header class="nav">
    <h2>Live Telemetry</h2>
</header>

<div class="dashboard-grid">

<div class="glass-card">
<h3>RPM</h3>
<canvas id="rpmChart"></canvas>
</div>

<div class="glass-card">
<h3>Battery Voltage</h3>
<canvas id="batteryChart"></canvas>
</div>

</div>

<script>

function createChart(id,label,max){
return new Chart(document.getElementById(id),{
type:'line',
data:{
labels:[],
datasets:[{
label:label,
data:[],
borderColor:'#5f9cff',
backgroundColor:'rgba(138,43,226,0.2)',
tension:0.4,
fill:true
}]
},
options:{
plugins:{legend:{labels:{color:'white'}}},
scales:{
x:{ticks:{color:'white'}},
y:{min:0,max:max,ticks:{color:'white'}}
}
}
});
}

const rpm = createChart("rpmChart","RPM",12000);
const battery = createChart("batteryChart","Voltage",15);

setInterval(()=>{
let time = new Date().toLocaleTimeString();

[rpm,battery].forEach(chart=>{
if(chart.data.labels.length>15){
chart.data.labels.shift();
chart.data.datasets[0].data.shift();
}
chart.data.labels.push(time);
});

rpm.data.datasets[0].data.push(6000 + Math.random()*5000);
battery.data.datasets[0].data.push(11 + Math.random()*3);

rpm.update();
battery.update();

},1000);

</script>

</body>
</html>
