<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAKTHI TELEMETRY | Vortex Pitwall</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Rajdhani', sans-serif;
            height: 100vh;
            /* FIXED: Your 145.jpeg background */
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)), 
                        url('145.jpeg') center/cover no-repeat fixed;
            color: #fff;
            overflow: hidden;
        }

        .header {
            position: absolute; top: 20px; left: 20px; right: 20px; z-index: 100;
            display: flex; align-items: center; gap: 20px; 
            font-family: 'Orbitron', monospace; font-size: 24px; font-weight: 900;
            background: rgba(0,0,0,0.7); padding: 15px 25px; border-radius: 15px;
            backdrop-filter: blur(20px); border: 1px solid rgba(0,255,136,0.3);
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }

        .main-content {
            height: 100vh; display: flex; flex-direction: column; 
            padding: 100px 25px 25px; gap: 25px; overflow-y: auto;
        }

        .section {
            background: rgba(15,20,40,0.95);
            backdrop-filter: blur(25px); border-radius: 20px;
            border: 2px solid rgba(0,255,136,0.3);
            padding: 30px; flex: 1; min-height: 280px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            position: relative; overflow: hidden;
        }

        .section h2 {
            font-family: 'Orbitron', monospace; font-size: 24px; 
            margin-bottom: 25px; color: #00ff88;
            display: flex; align-items: center; gap: 15px;
            text-shadow: 0 0 15px rgba(0,255,136,0.7);
        }

        .gauges { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); 
            gap: 20px; margin-bottom: 25px; 
        }

        .gauge-item { 
            text-align: center; 
            background: linear-gradient(145deg, rgba(0,0,0,0.6), rgba(20,25,50,0.8));
            border-radius: 15px; padding: 20px 15px; 
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
        }

        .gauge-value { 
            font-size: 28px; font-weight: 900; 
            color: #00ff88; margin-bottom: 8px;
            text-shadow: 0 0 10px rgba(0,255,136,0.5);
        }

        .gauge-label { 
            font-size: 12px; opacity: 0.9; 
            text-transform: uppercase; letter-spacing: 1px;
        }

        /* FIXED GRAPH VISIBILITY */
        .charts-row { 
            display: grid; grid-template-columns: repeat(4, 1fr); 
            gap: 15px; height: 140px; 
        }

        .chart-wrapper { 
            position: relative; height: 100%; 
            background: rgba(0,0,0,0.4);
            border-radius: 12px; overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .chart-wrapper canvas { 
            width: 100% !important; 
            height: 100% !important; 
        }

        .download-btn {
            position: absolute; bottom: 25px; right: 25px;
            background: linear-gradient(45deg, #00ff88, #00cc66);
            color: #000; border: none; padding: 12px 24px;
            border-radius: 30px; font-weight: 700; cursor: pointer;
            font-size: 14px; font-family: 'Rajdhani';
            box-shadow: 0 8px 25px rgba(0,255,136,0.4);
            transition: all 0.3s ease; text-transform: uppercase;
        }

        .download-btn:hover { 
            transform: translateY(-3px) scale(1.05); 
            box-shadow: 0 12px 30px rgba(0,255,136,0.6);
        }

        @media (max-width: 768px) { 
            .charts-row { grid-template-columns: 1fr; }
            .gauges { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <div class="header">
        <span style="font-size: 35px;">⚡</span>
        <strong>SAKTHI TELEMETRY</strong>
        <div style="margin-left: auto; font-size: 20px; font-weight: 600;" id="headerStats">
            85 4500 72 3 92 98 95
        </div>
    </div>

    <div class="main-content">
        <!-- POWERTRAIN -->
        <div class="section">
            <h2>🔥 Powertrain</h2>
            <div class="gauges">
                <div class="gauge-item">
                    <div class="gauge-value" data-id="rpm">4500</div>
                    <div class="gauge-label">RPM</div>
                </div>
                <div class="gauge-item">
                    <div class="gauge-value" data-id="tps">72</div>
                    <div class="gauge-label">TPS %</div>
                </div>
                <div class="gauge-item">
                    <div class="gauge-value" data-id="lambda">0.92</div>
                    <div class="gauge-label">Lambda</div>
                </div>
            </div>
            <div class="charts-row">
                <div class="chart-wrapper"><canvas id="power1"></canvas></div>
                <div class="chart-wrapper"><canvas id="power2"></canvas></div>
                <div class="chart-wrapper"><canvas id="power3"></canvas></div>
                <div class="chart-wrapper"><canvas id="power4"></canvas></div>
            </div>
            <button class="download-btn" onclick="downloadReport('Powertrain')">Download Report</button>
        </div>

        <!-- SUSPENSION -->
        <div class="section">
            <h2>🛠️ Suspension</h2>
            <div class="gauges">
                <div class="gauge-item"><div class="gauge-value" data-id="flSusp">320</div><div class="gauge-label">FL mm</div></div>
                <div class="gauge-item"><div class="gauge-value" data-id="frSusp">330</div><div class="gauge-label">FR mm</div></div>
                <div class="gauge-item"><div class="gauge-value" data-id="rlSusp">290</div><div class="gauge-label">RL mm</div></div>
                <div class="gauge-item"><div class="gauge-value" data-id="rrSusp">300</div><div class="gauge-label">RR mm</div></div>
            </div>
            <div class="charts-row">
                <div class="chart-wrapper"><canvas id="susp1"></canvas></div>
                <div class="chart-wrapper"><canvas id="susp2"></canvas></div>
                <div class="chart-wrapper"><canvas id="susp3"></canvas></div>
                <div class="chart-wrapper"><canvas id="susp4"></canvas></div>
            </div>
            <button class="download-btn" onclick="downloadReport('Suspension')">Download Report</button>
        </div>

        <!-- BRAKES -->
        <div class="section">
            <h2>🛑 Brakes</h2>
            <div class="gauges">
                <div class="gauge-item"><div class="gauge-value" data-id="brakePress">44</div><div class="gauge-label">Press</div></div>
                <div class="gauge-item"><div class="gauge-value" data-id="brakeTemp">340</div><div class="gauge-label">Temp °C</div></div>
            </div>
            <div class="charts-row">
                <div class="chart-wrapper"><canvas id="brake1"></canvas></div>
                <div class="chart-wrapper"><canvas id="brake2"></canvas></div>
                <div class="chart-wrapper"><canvas id="brake3"></canvas></div>
                <div class="chart-wrapper"><canvas id="brake4"></canvas></div>
            </div>
            <button class="download-btn" onclick="downloadReport('Brakes')">Download Report</button>
        </div>

        <!-- ELECTRICAL -->
        <div class="section">
            <h2>⚡ Electrical</h2>
            <div class="gauges">
                <div class="gauge-item"><div class="gauge-value" data-id="battSoc">85</div><div class="gauge-label">SOC %</div></div>
                <div class="gauge-item"><div class="gauge-value" data-id="volt">14.2</div><div class="gauge-label">Volt</div></div>
                <div class="gauge-item"><div class="gauge-value" data-id="current">320</div><div class="gauge-label">Amp</div></div>
                <div class="gauge-item"><div class="gauge-value" data-id="status">OK</div><div class="gauge-label">Status</div></div>
            </div>
            <div class="charts-row">
                <div class="chart-wrapper"><canvas id="elec1"></canvas></div>
                <div class="chart-wrapper"><canvas id="elec2"></canvas></div>
                <div class="chart-wrapper"><canvas id="elec3"></canvas></div>
                <div class="chart-wrapper"><canvas id="elec4"></canvas></div>
            </div>
            <button class="download-btn" onclick="downloadReport('Electrical')">Download Report</button>
        </div>
    </div>

    <script>
        const telemetryData = {
            header: [85, 4500, 72, 3, 92, 98, 95],
            powertrain: { rpm: 4500, tps: 72, lambda: 0.92 },
            suspension: { fl: 320, fr: 330, rl: 290, rr: 300 },
            brakes: { press: 44, temp: 340 },
            electrical: { soc: 85, volt: 14.2, current: 320 }
        };

        const charts = {};
        function initCharts() {
            const chartIds = ['power1','power2','power3','power4','susp1','susp2','susp3','susp4',
                             'brake1','brake2','brake3','brake4','elec1','elec2','elec3','elec4'];
            
            chartIds.forEach(id => {
                const canvas = document.getElementById(id);
                charts[id] = new Chart(canvas.getContext('2d'), {
                    type: 'line',
                    data: { 
                        labels: Array(25).fill(''),
                        datasets: [{
                            data: Array(25).fill(0).map(() => Math.random() * 100),
                            borderColor: '#00ff88',
                            backgroundColor: 'rgba(0,255,136,0.2)',
                            tension: 0.4,
                            borderWidth: 3,
                            fill: true,
                            pointRadius: 0
                        }]
                    },
                    options: { 
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { display: false } },
                        scales: { 
                            x: { display: false, grid: { display: false } }, 
                            y: { display: false, grid: { display: false } }
                        },
                        elements: { point: { radius: 0 } },
                        animation: { duration: 0 }
                    }
                });
            });
        }

        function updateDisplay() {
            const data = {
                rpm: 4500 + Math.sin(Date.now() * 0.001) * 1000,
                tps: 72 + (Math.random() - 0.5) * 10,
                lambda: 0.92 + (Math.random() - 0.5) * 0.1,
                flSusp: 320 + (Math.random() - 0.5) * 20,
                frSusp: 330 + (Math.random() - 0.5) * 20,
                rlSusp: 290 + (Math.random() - 0.5) * 20,
                rrSusp: 300 + (Math.random() - 0.5) * 20,
                brakePress: 44 + Math.random() * 20,
                brakeTemp: 340 + Math.random() * 30,
                battSoc: 85 + (Math.random() - 0.5) * 5,
                volt: 14.2 + (Math.random() - 0.5) * 0.5,
                current: 320 + (Math.random() - 0.5) * 50
            };

            // Update all gauges
            ['rpm', 'tps', 'lambda', 'flSusp', 'frSusp', 'rlSusp', 'rrSusp', 
             'brakePress', 'brakeTemp', 'battSoc', 'volt', 'current'].forEach(id => {
                const el = document.querySelector(`[data-id="${id}"]`);
                if (el) {
                    if (id === 'lambda' || id === 'volt') {
                        el.textContent = data[id].toFixed(2);
                    } else if (id === 'volt') {
                        el.textContent = data[id].toFixed(1);
                    } else {
                        el.textContent = Math.floor(data[id]);
                    }
                }
            });
            document.querySelector('[data-id="status"]').textContent = 'OK';

            // Update header
            document.getElementById('headerStats').textContent = 
                `${Math.floor(data.battSoc)} ${Math.floor(data.rpm)} ${Math.floor(data.tps)} 3 92 98 95`;

            // Update charts
            Object.values(charts).forEach(chart => {
                chart.data.labels.push('');
                chart.data.datasets[0].data.push(Math.random() * 100 + 20);
                if (chart.data.labels.length > 25) {
                    chart.data.labels.shift();
                    chart.data.datasets[0].data.shift();
                }
                chart.update('none');
            });
        }

        function downloadReport(section) {
            const report = `${section} TELEMETRY REPORT - SAKTHI RACING\n` +
                          `Generated: ${new Date().toLocaleString('en-IN')}\n\n` +
                          `Vortex Pitwall Live Data Capture\n` +
                          `================================\n\n` +
                          `Deployed: https://YOURUSERNAME.github.io/sakthi-telemetry\n\n` +
                          `FSAE Competition Ready! 🏆`;
            
            const blob = new Blob([report], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; 
            a.download = `sakthi-${section.toLowerCase()}-report-${Date.now()}.txt`; 
            a.click();
            URL.revokeObjectURL(url);
        }

        // START
        initCharts();
        updateDisplay();
        setInterval(updateDisplay, 1000);
    </script>
</body>
</html>
