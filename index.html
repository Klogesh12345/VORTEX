<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>F1 Telemetry Dashboard</title>

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
  --red:#FF2D2D;
  --deep-red:#A00000;
  --bg:#0A0F1C;
  --cyan:#00F5FF;
  --orange:#FF6A00;
}

body{
  margin:0;
  font-family:'Orbitron', sans-serif;
  background:var(--bg);
  color:#EAF2FF;
}

/* Sidebar */
.sidebar{
  width:200px;
  height:100vh;
  position:fixed;
  background:#0f1629;
  padding:20px;
}
.sidebar div{
  margin:20px 0;
  cursor:pointer;
}

/* Header */
.header{
  margin-left:200px;
  padding:15px;
  background:#111a30;
  display:flex;
  justify-content:space-between;
}

.live{
  color:var(--red);
  animation:blink 1s infinite;
}
@keyframes blink{
  50%{opacity:0;}
}

/* Dashboard */
.main{
  margin-left:200px;
  padding:20px;
}

.card{
  background:rgba(255,255,255,0.05);
  border-radius:12px;
  padding:20px;
  margin-bottom:20px;
  box-shadow:0 0 10px rgba(255,45,45,0.3);
}

/* Gauges */
canvas{
  display:block;
  margin:auto;
}

/* Button */
.btn{
  padding:10px 15px;
  background:linear-gradient(45deg,var(--red),var(--deep-red));
  border:none;
  color:white;
  cursor:pointer;
  border-radius:8px;
  margin-top:10px;
}

/* Modal */
.modal{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
}
.modal-content{
  background:#111a30;
  padding:20px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="sidebar">
  <div>Powertrain</div>
  <div>Suspension</div>
  <div>Brakes</div>
  <div>Electrical</div>
  <div>Telemetry</div>
</div>

<div class="header">
  <h2>Racing Telemetry Dashboard</h2>
  <div class="live">● LIVE</div>
</div>

<div class="main">

  <div class="card">
    <h3>Speed</h3>
    <canvas id="speedGauge" width="200" height="200"></canvas>
    <button class="btn" onclick="openGraph()">View Graph</button>
  </div>

</div>

<!-- Modal -->
<div class="modal" id="graphModal">
  <div class="modal-content">
    <canvas id="chart"></canvas>
    <br>
    <button class="btn" onclick="downloadPNG()">Download PNG</button>
    <button class="btn" onclick="downloadCSV()">Download CSV</button>
    <button class="btn" onclick="closeGraph()">Close</button>
  </div>
</div>

<script>
// -------- Gauge --------
const ctx = document.getElementById("speedGauge").getContext("2d");
let speed = 0;

function drawGauge(val){
  ctx.clearRect(0,0,200,200);

  ctx.beginPath();
  ctx.arc(100,100,80,Math.PI,2*Math.PI);
  ctx.strokeStyle="#333";
  ctx.lineWidth=10;
  ctx.stroke();

  ctx.beginPath();
  ctx.arc(100,100,80,Math.PI,Math.PI + (val/200)*Math.PI);
  ctx.strokeStyle="#00F5FF";
  ctx.lineWidth=10;
  ctx.shadowColor="#00F5FF";
  ctx.shadowBlur=15;
  ctx.stroke();

  ctx.fillText(val+" km/h",60,110);
}

// simulate live data
setInterval(()=>{
  speed = Math.floor(Math.random()*200);
  drawGauge(speed);
  addData(speed);
},1000);

// -------- Chart --------
let dataArr = [];
let labels = [];

const chart = new Chart(document.getElementById("chart"), {
  type: 'line',
  data: {
    labels: labels,
    datasets: [{
      label: 'Speed',
      data: dataArr,
      borderColor: '#00F5FF',
      fill:true,
    }]
  }
});

function addData(val){
  if(dataArr.length>20){
    dataArr.shift();
    labels.shift();
  }
  dataArr.push(val);
  labels.push('');
  chart.update();
}

// -------- Modal --------
function openGraph(){
  document.getElementById("graphModal").style.display="flex";
}
function closeGraph(){
  document.getElementById("graphModal").style.display="none";
}

// -------- Download --------
function downloadPNG(){
  const link = document.createElement('a');
  link.href = chart.toBase64Image();
  link.download = "graph.png";
  link.click();
}

function downloadCSV(){
  let csv = "Speed\n";
  dataArr.forEach(d=>csv+=d+"\n");

  const blob = new Blob([csv], {type:'text/csv'});
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = "data.csv";
  link.click();
}
</script>

</body>
</html>
