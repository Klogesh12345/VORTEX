<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sakthi Racing Telemetry Pro</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0f172a;
    color:white;
}

/* SIDEBAR */

.sidebar{
    position:fixed;
    height:100%;
    width:90px;
    background:#111827;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding-top:30px;
    gap:25px;
}

.sidebar button{
    background:none;
    border:none;
    color:#00f7ff;
    cursor:pointer;
    font-size:12px;
    writing-mode:vertical-rl;
    transform:rotate(180deg);
}

.sidebar button:hover{
    color:#00ff88;
}

/* CONTENT */

.content{
    margin-left:110px;
    padding:40px;
}

.section{
    display:none;
}

.section.active{
    display:block;
}

canvas{
    background:#111;
    padding:20px;
    border-radius:10px;
    margin-top:20px;
}

/* DOWNLOAD BUTTON */

.download{
    margin-top:20px;
    padding:10px 20px;
    background:#00f7ff;
    border:none;
    cursor:pointer;
}

/* FUSE */

.fuse{
    display:inline-block;
    width:20px;
    height:20px;
    border-radius:50%;
    background:lime;
    margin:5px;
}
.fuse.off{
    background:red;
}
</style>
</head>
<body>

<div class="sidebar">
    <button onclick="showSection('power')">POWERTRAIN</button>
    <button onclick="showSection('suspension')">SUSPENSION</button>
    <button onclick="showSection('brakes')">BRAKES</button>
    <button onclick="showSection('electrical')">ELECTRICAL</button>
    <button onclick="showSection('embedded')">EMBEDDED</button>
</div>

<div class="content">

<!-- POWERTRAIN -->
<div id="power" class="section active">
<h2>Powertrain</h2>
<p>Speed: <span id="speedVal">80</span> km/h</p>
<p>RPM: <span id="rpmVal">6500</span></p>
<canvas id="powerChart"></canvas>
<button class="download" onclick="downloadReport('Powertrain Report')">Download Report</button>
</div>

<!-- SUSPENSION -->
<div id="suspension" class="section">
<h2>Suspension</h2>
<p>Load Cells & Travel Graph</p>
<canvas id="suspensionChart"></canvas>
<button class="download" onclick="downloadReport('Suspension Report')">Download Report</button>
</div>

<!-- BRAKES -->
<div id="brakes" class="section">
<h2>Brakes</h2>
<p>Brake Pressure & Rotor Temp</p>
<canvas id="brakeChart"></canvas>
<button class="download" onclick="downloadReport('Brake Report')">Download Report</button>
</div>

<!-- ELECTRICAL -->
<div id="electrical" class="section">
<h2>Electrical</h2>
<p>Battery Voltage: 12.8V</p>
<canvas id="electricalChart"></canvas>

<h3>Fuse Status</h3>
<div id="fuses">
<div class="fuse"></div>
<div class="fuse"></div>
<div class="fuse"></div>
<div class="fuse off"></div>
<div class="fuse"></div>
<div class="fuse"></div>
</div>

<button class="download" onclick="downloadReport('Electrical Report')">Download Report</button>
</div>

<!-- EMBEDDED -->
<div id="embedded" class="section">
<h2>Embedded Data</h2>
<p>Data Transmission: <span style="color:lime;">ACTIVE</span></p>
<button class="download" onclick="downloadReport('Embedded Report')">Download Report</button>
</div>

</div>

<script>
function showSection(id){
    document.querySelectorAll('.section').forEach(sec=>{
        sec.classList.remove('active');
    });
    document.getElementById(id).classList.add('active');
}

function downloadReport(name){
    alert("Downloading " + name);
}

/* SAMPLE CHARTS */

new Chart(document.getElementById("powerChart"),{
type:'line',
data:{
labels:['1','2','3','4','5'],
datasets:[
{label:'Speed',data:[40,60,80,75,90]},
{label:'RPM',data:[3000,5000,6500,6000,7000]}
]
}
});

new Chart(document.getElementById("suspensionChart"),{
type:'line',
data:{
labels:['1','2','3','4','5'],
datasets:[
{label:'Load Cell FL',data:[100,120,130,110,140]},
{label:'Travel FR',data:[10,15,12,18,14]}
]
}
});

new Chart(document.getElementById("brakeChart"),{
type:'line',
data:{
labels:['1','2','3','4','5'],
datasets:[
{label:'Brake Pressure',data:[20,40,35,60,50]},
{label:'Rotor Temp',data:[100,150,200,180,220]}
]
}
});

new Chart(document.getElementById("electricalChart"),{
type:'line',
data:{
labels:['1','2','3','4','5'],
datasets:[
{label:'Battery Voltage',data:[12.6,12.7,12.8,12.75,12.9]}
]
}
});
</script>

</body>
</html>
