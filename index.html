<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAKTHI RACING VORTEX | Formula Student</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    margin:0;
    background:#0a0f1c;
    color:white;
    font-family:Arial, Helvetica, sans-serif;
}

header{
    background:linear-gradient(90deg,#ff6b00,#ff0000);
    padding:20px;
    text-align:center;
}

header h1{
    margin:0;
    font-size:28px;
    letter-spacing:3px;
}

header p{
    margin:5px 0 0;
    font-weight:bold;
}

.launch-banner{
    text-align:center;
    background:#111a2e;
    padding:10px;
    font-size:18px;
    color:#ff6b00;
    letter-spacing:2px;
}

.dashboard{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:20px;
    padding:20px;
}

.card{
    background:#141c2b;
    padding:20px;
    border-radius:12px;
    border:1px solid #222;
}

.card h2{
    margin-top:0;
    color:#ff6b00;
}

canvas{
    background:#0d1322;
    border-radius:10px;
}

@media(max-width:900px){
    .dashboard{
        grid-template-columns:1fr;
    }
}
</style>
</head>
<body>

<header>
<h1>SAKTHI RACING VORTEX</h1>
<p>FORMULA STUDENT | VORTEX LAUNCHING 🚀</p>
</header>

<div class="launch-banner">
🔥 VORTEX CAR LAUNCH TELEMETRY – LIVE PERFORMANCE MONITORING 🔥
</div>

<div class="dashboard">

<div class="card">
<h2>ENGINE RPM</h2>
<canvas id="rpmChart"></canvas>
</div>

<div class="card">
<h2>BRAKE PRESSURE</h2>
<canvas id="brakeChart"></canvas>
</div>

<div class="card">
<h2>G-FORCE (Vehicle Dynamics)</h2>
<canvas id="gforceChart"></canvas>
</div>

<div class="card">
<h2>BATTERY POWER OUTPUT</h2>
<canvas id="powerChart"></canvas>
</div>

</div>

<script>

// ---------- RPM CHART ----------
const rpmCtx = document.getElementById('rpmChart');
const rpmChart = new Chart(rpmCtx,{
    type:'line',
    data:{
        labels:[],
        datasets:[{
            label:'RPM',
            data:[],
            borderColor:'#ff6b00',
            backgroundColor:'rgba(255,107,0,0.2)',
            tension:0.4
        }]
    },
    options:{responsive:true,scales:{y:{min:0,max:12000}}}
});

// ---------- BRAKE CHART ----------
const brakeCtx = document.getElementById('brakeChart');
const brakeChart = new Chart(brakeCtx,{
    type:'line',
    data:{
        labels:[],
        datasets:[
            {
                label:'Front Pressure',
                data:[],
                borderColor:'#00ffcc'
            },
            {
                label:'Rear Pressure',
                data:[],
                borderColor:'#ff4444'
            }
        ]
    },
    options:{responsive:true}
});

// ---------- G-FORCE ----------
const gCtx = document.getElementById('gforceChart');
const gChart = new Chart(gCtx,{
    type:'line',
    data:{
        labels:[],
        datasets:[
            {label:'Lat G',data:[],borderColor:'#00ff00'},
            {label:'Long G',data:[],borderColor:'#ffff00'}
        ]
    },
    options:{responsive:true,scales:{y:{min:-3,max:3}}}
});

// ---------- POWER ----------
const powerCtx = document.getElementById('powerChart');
const powerChart = new Chart(powerCtx,{
    type:'line',
    data:{
        labels:[],
        datasets:[
            {label:'kW Output',data:[],borderColor:'#ff00ff'}
        ]
    },
    options:{responsive:true}
});

// --------- DEMO DATA SIMULATION ---------
function updateCharts(){
    const time = new Date().toLocaleTimeString();

    if(rpmChart.data.labels.length > 20){
        rpmChart.data.labels.shift();
        rpmChart.data.datasets[0].data.shift();
        brakeChart.data.labels.shift();
        brakeChart.data.datasets[0].data.shift();
        brakeChart.data.datasets[1].data.shift();
        gChart.data.labels.shift();
        gChart.data.datasets[0].data.shift();
        gChart.data.datasets[1].data.shift();
        powerChart.data.labels.shift();
        powerChart.data.datasets[0].data.shift();
    }

    rpmChart.data.labels.push(time);
    brakeChart.data.labels.push(time);
    gChart.data.labels.push(time);
    powerChart.data.labels.push(time);

    rpmChart.data.datasets[0].data.push(7000 + Math.random()*4000);
    brakeChart.data.datasets[0].data.push(Math.random()*8);
    brakeChart.data.datasets[1].data.push(Math.random()*5);
    gChart.data.datasets[0].data.push((Math.random()*2-1)*2);
    gChart.data.datasets[1].data.push((Math.random()*2-1)*2);
    powerChart.data.datasets[0].data.push(40 + Math.random()*60);

    rpmChart.update();
    brakeChart.update();
    gChart.update();
    powerChart.update();
}

setInterval(updateCharts,1000);

</script>

</body>
</html>
