<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sakthi Racing Telemetry</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: 'Segoe UI', sans-serif;
}

body{
background:#0a0f1c;
color:white;
scroll-behavior:smooth;
}

/* SLIM SIDEBAR */

.sidebar{
position:fixed;
left:0;
top:0;
height:100%;
width:70px;
background:#111827;
display:flex;
flex-direction:column;
align-items:center;
padding-top:30px;
gap:35px;
}

.sidebar a{
color:#00f0ff;
font-size:22px;
transition:0.3s;
}

.sidebar a:hover{
color:#00ff88;
transform:scale(1.2);
}

/* SECTIONS */

.section{
margin-left:70px;
min-height:100vh;
padding:60px;
}

/* HERO */

.hero{
position:relative;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
overflow:hidden;
}

.hero img{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
z-index:-1;
filter:brightness(0.5);
}

.hero h1{
font-size:60px;
letter-spacing:3px;
color:#00f0ff;
}

.enter-btn{
margin-top:30px;
padding:12px 30px;
border:1px solid #00f0ff;
background:transparent;
color:#00f0ff;
cursor:pointer;
transition:0.3s;
}

.enter-btn:hover{
background:#00f0ff;
color:black;
}

/* DASHBOARD CARDS */

.card{
background:#141b2d;
padding:25px;
border-radius:12px;
margin-top:30px;
box-shadow:0 0 20px rgba(0,255,255,0.1);
}

h2{
color:#00f0ff;
margin-bottom:10px;
}

canvas{
background:#0a0f1c;
margin-top:15px;
border-radius:8px;
}

/* FLOAT GRAPH BUTTON */

.plotter{
position:fixed;
bottom:25px;
right:25px;
background:#00f0ff;
width:60px;
height:60px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
color:black;
font-size:22px;
cursor:pointer;
box-shadow:0 0 20px #00f0ff;
}
</style>
</head>

<body>

<div class="sidebar">
<a href="#home"><i class="fas fa-house"></i></a>
<a href="#power"><i class="fas fa-engine"></i></a>
<a href="#suspension"><i class="fas fa-car-side"></i></a>
<a href="#brakes"><i class="fas fa-stop"></i></a>
<a href="#electrical"><i class="fas fa-bolt"></i></a>
</div>

<section id="home" class="section hero">
<img src="145.jpeg">
<div style="text-align:center;">
<h1>SAKTHI RACING</h1>
<button class="enter-btn" onclick="location.href='#power'">
ENTER DASHBOARD ↓
</button>
</div>
</section>

<section id="power" class="section">
<h2>Powertrain</h2>
<div class="card">
Speed, RPM, TPS, Gear, Coolant Temp, IAC, Radiator Temp
<canvas id="powerChart"></canvas>
</div>
</section>

<section id="suspension" class="section">
<h2>Suspension</h2>
<div class="card">
4 Load Cells + 4 Travel Sensors
<canvas id="susChart"></canvas>
</div>
</section>

<section id="brakes" class="section">
<h2>Brakes</h2>
<div class="card">
Brake Pressure + Rotor Temperature
<canvas id="brakeChart"></canvas>
</div>
</section>

<section id="electrical" class="section">
<h2>Electrical</h2>
<div class="card">
Battery + 6 Fuses + Data Transfer
<canvas id="elecChart"></canvas>
</div>
</section>

<div class="plotter">
<i class="fas fa-chart-line"></i>
</div>

<script>

new Chart(powerChart,{
type:'line',
data:{
labels:['1','2','3','4','5'],
datasets:[
{label:'RPM',data:[1000,2000,3500,4000,5000]},
{label:'Speed',data:[20,40,70,90,110]}
]
}
});

new Chart(susChart,{
type:'line',
data:{
labels:['1','2','3','4','5'],
datasets:[
{label:'Load Cell FL',data:[10,15,20,18,14]}
]
}
});

new Chart(brakeChart,{
type:'line',
data:{
labels:['1','2','3','4','5'],
datasets:[
{label:'Brake Temp',data:[200,250,280,320,350]}
]
}
});

new Chart(elecChart,{
type:'line',
data:{
labels:['1','2','3','4','5'],
datasets:[
{label:'Battery Voltage',data:[12.5,12.4,12.6,12.3,12.5]}
]
}
});

</script>

</body>
</html>
