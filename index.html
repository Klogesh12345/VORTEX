<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAKTHI TELEMETRY - Vortex Pitwall | Formula Student</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Exo+2:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-primary: linear-gradient(135deg, #0a0a0a 0%, #1a0d1a 50%, #0f0f23 100%);
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent-neon: #00ff88;
            --accent-red: #ff4757;
            --accent-blue: #3742fa;
            --accent-orange: #ffa502;
            --glow-neon: 0 0 20px rgba(0, 255, 136, 0.5);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Rajdhani', sans-serif;
            background: var(--bg-primary), url('background.jpg') center/cover fixed; /* Your NEWWWWWWWW.jpg here */
            color: white;
            overflow-x: hidden;
            animation: bgPulse 10s ease-in-out infinite alternate;
        }
        @keyframes bgPulse { 0% { filter: brightness(0.9) contrast(1); } 100% { filter: brightness(1.1) contrast(1.1); } }
        .header {
            position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(20px);
            padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center;
        }
        .logo { font-family: 'Orbitron', monospace; font-size: 1.8rem; font-weight: 900; background: linear-gradient(45deg, var(--accent-neon), var(--accent-orange)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .container { max-width: 1400px; margin: 0 auto; padding: 120px 2rem 2rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 2rem; }
        .card {
            background: var(--glass-bg); backdrop-filter: blur(20px); border: 1px solid var(--glass-border);
            border-radius: 20px; padding: 1.5rem; box-shadow: var(--glow-neon), inset 0 1px 0 rgba(255,255,255,0.1);
            transition: all 0.3s ease; position: relative; overflow: hidden;
        }
        .card::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent); transform: rotate(45deg); transition: 0.5s; }
        .card:hover::before { animation: shine 1s infinite; }
        @keyframes shine { 0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); } 100% { transform: translateX(100%) translateY(100%) rotate(45deg); } }
        .card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,255,136,0.3); }
        .card h3 { font-family: 'Orbitron', monospace; font-size: 1.2rem; margin-bottom: 1rem; color: var(--accent-neon); display: flex; align-items: center; gap: 0.5rem; }
        .gauge { width: 100%; height: 150px; position: relative; }
        .gauge svg { width: 100%; height: 100%; transform: rotate(-90deg); }
        .gauge circle { fill: none; stroke: rgba(255,255,255,0.1); stroke-width: 8; }
        .gauge .progress { stroke: url(#gradient); stroke-linecap: round; stroke-width: 8; transition: stroke-dasharray 0.5s ease; }
        .value { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-family: 'Orbitron', monospace; font-size: 1.5rem; font-weight: 700; }
        .chart-container { height: 200px; }
        canvas { max-height: 200px; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(80px, 1fr)); gap: 1rem; margin-top: 1rem; }
        .stat { text-align: center; }
        .stat-value { font-size: 1.8rem; font-weight: 700; color: var(--accent-neon); }
        .stat-label { font-size: 0.8rem; opacity: 0.8; }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">SAKTHI TELEMETRY <i class="fas fa-bolt"></i></div>
        <div>Live Vortex Pitwall | FS 2026</div>
    </header>
    <div class="container">
        <div class="grid">
            <div class="card">
                <h3><i class="fas fa-tachometer-alt"></i> Powertrain</h3>
                <div class="gauge" id="rpmGauge">
                    <svg viewBox="0 0 100 100">
                        <defs>
                            <linearGradient id="rpmGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="#ffaa00"/>
                                <stop offset="50%" stop-color="#ff4757"/>
                                <stop offset="100%" stop-color="#ff0040"/>
                            </linearGradient>
                        </defs>
                        <circle cx="50" cy="50" r="42" />
                        <circle class="progress" cx="50" cy="50" r="42" stroke-dasharray="263.89" stroke-dashoffset="263.89" stroke="url(#rpmGrad)"/>
                    </svg>
                    <div class="value" id="rpmValue">4500</div>
                </div>
                <div class="stats">
                    <div class="stat"><div class="stat-value" id="tps">72</div><div class="stat-label">TPS %</div></div>
                    <div class="stat"><div class="stat-value" id="lambda">0.92</div><div class="stat-label">Lambda</div></div>
                </div>
                <canvas class="chart-container" id="powerChart"></canvas>
            </div>
            <div class="card">
                <h3><i class="fas fa-car-bump"></i> Suspension</h3>
                <div class="stats">
                    <div class="stat"><div class="stat-value" id="flSusp">320</div><div class="stat-label">FL mm</div></div>
                    <div class="stat"><div class="stat-value" id="frSusp">330</div><div class="stat-label">FR mm</div></div>
                    <div class="stat"><div class="stat-value" id="rlSusp">290</div><div class="stat-label">RL mm</div></div>
                    <div class="stat"><div class="stat-value" id="rrSusp">300</div><div class="stat-label">RR mm</div></div>
                </div>
                <canvas class="chart-container" id="suspChart"></canvas>
            </div>
            <div class="card">
                <h3><i class="fas fa-stopwatch"></i> Brakes</h3>
                <div class="gauge" id="brakeGauge">
                    <svg viewBox="0 0 100 100">
                        <defs>
                            <linearGradient id="brakeGrad" x1="0%" y1="100%" x2="100%" y2="0%">
                                <stop offset="0%" stop-color="#00d4ff"/>
                                <stop offset="100%" stop-color="#0099cc"/>
                            </linearGradient>
                        </defs>
                        <circle cx="50" cy="50" r="42" />
                        <circle class="progress" cx="50" cy="50" r="42" stroke-dasharray="263.89" stroke-dashoffset="263.89" stroke="url(#brakeGrad)"/>
                    </svg>
                    <div class="value" id="brakeValue">44</div>
                </div>
                <canvas class="chart-container" id="brakeChart"></canvas>
            </div>
            <div class="card">
                <h3><i class="fas fa-bolt"></i> Electrical</h3>
                <div class="stats">
                    <div class="stat"><div class="stat-value" id="battery">85</div><div class="stat-label">SOC %</div></div>
                    <div class="stat"><div class="stat-value" id="volt">14.2</div><div class="stat-label">Volt</div></div>
                    <div class="stat"><div class="stat-value" id="current">320</div><div class="stat-label">Amp</div></div>
                </div>
                <canvas class="chart-container" id="elecChart"></canvas>
            </div>
        </div>
    </div>
    <script>
        // Simulated real-time data (replace with WebSocket/ESP32 fetch)
        function updateData() {
            const data = {
                rpm: 4500 + Math.sin(Date.now() * 0.001) * 2000,
                tps: 72 + (Math.random() - 0.5) * 10,
                lambda: 0.92 + (Math.random() - 0.5) * 0.1,
                susp: [320, 330, 290, 300].map(v => v + (Math.random() - 0.5) * 5),
                brake: 44 + Math.random() * 20,
                battery: 85 + (Math.random() - 0.5) * 5,
                volt: 14.2 + (Math.random() - 0.5) * 0.5,
                current: 320 + (Math.random() - 0.5) * 50
            };
            document.getElementById('rpmValue').textContent = Math.floor(data.rpm);
            document.getElementById('tps').textContent = Math.floor(data.tps);
            document.getElementById('lambda').textContent = data.lambda.toFixed(2);
            ['flSusp', 'frSusp', 'rlSusp', 'rrSusp'].forEach((id, i) => document.getElementById(id).textContent = Math.floor(data.susp[i]));
            document.getElementById('brakeValue').textContent = Math.floor(data.brake);
            document.getElementById('battery').textContent = Math.floor(data.battery);
            document.getElementById('volt').textContent = data.volt.toFixed(1);
            document.getElementById('current').textContent = Math.floor(data.current);
            updateGauges(data);
            updateCharts(data);
        }
        function updateGauges(data) {
            const rpmCirc = 263.89 * (data.rpm / 8500);
            document.querySelector('#rpmGauge .progress').style.strokeDashoffset = 263.89 - rpmCirc;
            const brakeCirc = 263.89 * (data.brake / 100);
            document.querySelector('#brakeGauge .progress').style.strokeDashoffset = 263.89 - brakeCirc;
        }
        let powerChart, suspChart, brakeChart, elecChart;
        function initCharts() {
            const ctx1 = document.getElementById('powerChart').getContext('2d');
            powerChart = new Chart(ctx1, { type: 'line', data: { labels: [], datasets: [{ label: 'RPM', borderColor: '#ff4757', data: [], tension: 0.4 }] }, options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: false } }, plugins: { legend: { display: false } } } });
            // Similar for other charts...
            const ctx2 = document.getElementById('suspChart').getContext('2d');
            suspChart = new Chart(ctx2, { type: 'line', data: { labels: [], datasets: [{ label: 'Susp', borderColor: '#00ff88', data: [], tension: 0.4 }] }, options: { responsive: true, maintainAspectRatio: false } });
            const ctx3 = document.getElementById('brakeChart').getContext('2d');
            brakeChart = new Chart(ctx3, { type: 'line', data: { labels: [], datasets: [{ label: 'Brake Press', borderColor: '#3742fa', data: [], tension: 0.4 }] }, options: { responsive: true, maintainAspectRatio: false } });
            const ctx4 = document.getElementById('elecChart').getContext('2d');
            elecChart = new Chart(ctx4, { type: 'line', data: { labels: [], datasets: [{ label: 'Current', borderColor: '#ffa502', data: [], tension: 0.4 }] }, options: { responsive: true, maintainAspectRatio: false } });
        }
        function updateCharts(data) {
            const time = new Date().toLocaleTimeString();
            [powerChart, suspChart, brakeChart, elecChart].forEach((chart, i) => {
                chart.data.labels.push(time);
                chart.data.datasets[0].data.push(i === 0 ? data.rpm : i === 1 ? data.susp[0] : i === 2 ? data.brake : data.current);
                if (chart.data.labels.length > 20) { chart.data.labels.shift(); chart.data.datasets[0].data.shift(); }
                chart.update('none');
            });
        }
        initCharts();
        setInterval(updateData, 500);
        updateData();
    </script>
</body>
</html>
