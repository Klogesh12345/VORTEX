<!DOCTYPE html>
<html>
<head>
    <title>VORTEX Telemetry</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard-body">

<h1 class="dashboard-title">VORTEX LIVE TELEMETRY</h1>

<div class="grid">

<!-- POWERTRAIN -->
<div class="card">
<h2>Powertrain</h2>
<canvas id="rpm"></canvas>
<canvas id="throttle"></canvas>
<canvas id="map"></canvas>
<canvas id="coolant"></canvas>
</div>

<!-- ELECTRICAL -->
<div class="card">
<h2>Electrical</h2>
<canvas id="battery"></canvas>
<canvas id="fuse"></canvas>
</div>

<!-- SUSPENSION -->
<div class="card">
<h2>Suspension</h2>
<canvas id="suspension"></canvas>
</div>

<!-- BRAKES -->
<div class="card">
<h2>Brakes</h2>
<canvas id="brake"></canvas>
</div>

</div>

<script>

function createChart(id,label,max){
return new Chart(document.getElementById(id),{
type:'line',
data:{
labels:[],
datasets:[{
label:label,
data:[],
borderColor:'#c77dff',
backgroundColor:'rgba(199,125,255,0.1)',
tension:0.4,
fill:true
}]
},
options:{
responsive:true,
plugins:{
legend:{labels:{color:'white'}}
},
scales:{
x:{ticks:{color:'white'}},
y:{min:0,max:max,ticks:{color:'white'}}
}
}
});
}

let rpmChart=createChart("rpm","RPM",12000);
let throttleChart=createChart("throttle","Throttle %",100);
let mapChart=createChart("map","Manifold Pressure (kPa)",200);
let coolantChart=createChart("coolant","Coolant Temp °C",120);
let batteryChart=createChart("battery","Battery Voltage",15);
let fuseChart=createChart("fuse","Fuse Output (A)",30);
let suspensionChart=createChart("suspension","Suspension Travel (mm)",100);
let brakeChart=createChart("brake","Brake Pressure (bar)",10);

function update(chart,value){
let time=new Date().toLocaleTimeString();

if(chart.data.labels.length>20){
chart.data.labels.shift();
chart.data.datasets[0].data.shift();
}

chart.data.labels.push(time);
chart.data.datasets[0].data.push(value);
chart.update();
}

setInterval(()=>{
update(rpmChart,7000+Math.random()*4000);
update(throttleChart,Math.random()*100);
update(mapChart,80+Math.random()*40);
update(coolantChart,80+Math.random()*20);
update(batteryChart,12+Math.random()*2);
update(fuseChart,Math.random()*20);
update(suspensionChart,Math.random()*80);
update(brakeChart,Math.random()*8);
},1000);

</script>

</body>
</html>
