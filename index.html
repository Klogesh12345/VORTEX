
     <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAKTHI RACING | VORTEX PITWALL</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Rajdhani', sans-serif;
            background: #0a0a0a;
            color: white;
            overflow-x: hidden;
        }

        /* FALLBACK + WORKING BACKGROUND */
        .landing {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
            background: 
                /* TRY 3 METHODS - ONE WILL WORK */
                linear-gradient(135deg, rgba(15,15,20,0.9), rgba(0,0,0,0.8)),
                /* METHOD 1: Your GitHub raw URL - REPLACE YOUR_USERNAME */
                url('https://raw.githubusercontent.com/YOUR_USERNAME/vortex-pitwall/main/145.jpeg') center/cover no-repeat fixed,
                /* METHOD 2: Relative path */
                url('./145.jpeg') center/cover no-repeat fixed,
                /* METHOD 3: Fallback gradient */
                linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f0f23 100%);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .team-title {
            font-family: 'Orbitron', monospace;
            font-size: clamp(4rem, 12vw, 8rem);
            font-weight: 900;
            background: linear-gradient(45deg, #ff6b35, #00d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(255,107,53,0.5);
            margin-bottom: 1rem;
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { filter: drop-shadow(0 0 20px rgba(255,107,53,0.5)); }
            to { filter: drop-shadow(0 0 40px rgba(255,107,53,0.8)); }
        }

        .enter-btn {
            font-family: 'Orbitron', monospace;
            font-size: 1.4rem;
            font-weight: 700;
            padding: 1.5rem 3rem;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(20px);
            border: 2px solid rgba(255,107,53,0.5);
            border-radius: 50px;
            color: white;
            cursor: pointer;
            margin: 2rem 0;
            transition: all 0.3s ease;
        }

        .enter-btn:hover {
            background: rgba(255,107,53,0.2);
            box-shadow: 0 0 30px rgba(255,107,53,0.5);
            transform: scale(1.05);
        }

        .subsystems {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 2rem;
            max-width: 1000px;
            padding: 2rem;
        }

        .subsystem {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 2rem;
            text-align: center;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.2);
            transition: all 0.3s ease;
        }

        .subsystem:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(255,107,53,0.3);
            border-color: #ff6b35;
        }

        .subsystem i {
            font-size: 4rem;
            display: block;
            margin-bottom: 1rem;
            background: linear-gradient(45deg, #ff6b35, #00d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Dashboard */
        .dashboard {
            min-height: 100vh;
            padding: 2rem;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f0f23 100%);
            display: none;
        }

        .dashboard h1 {
            font-family: 'Orbitron', monospace;
            font-size: 3rem;
            background: linear-gradient(45deg, #ff6b35, #00d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 2rem;
        }

        .back-btn {
            position: absolute;
            top: 2rem;
            left: 2rem;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 1rem 2rem;
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Orbitron', monospace;
        }

        .back-btn:hover { background: #ff6b35; }

        .sensors {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2rem;
            margin: 2rem 0;
        }

        .sensor-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
            padding: 2rem;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.2);
            text-align: center;
        }

        .sensor-value {
            font-family: 'Orbitron', monospace;
            font-size: 3rem;
            font-weight: 700;
            background: linear-gradient(45deg, #00d4ff, #ff6b35);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body>
    <!-- LANDING -->
    <div id="landing" class="landing">
        <h1 class="team-title">SAKTHI RACING</h1>
        <p style="font-size: 1.5rem; margin-bottom: 3rem; opacity: 0.9;">
            VORTEX PITWALL TELEMETRY<br>
            <small>Formula Student India 2026</small>
        </p>
        <button class="enter-btn" onclick="showDashboard('powertrain')">ENTER DASHBOARD</button>
        
        <div class="subsystems">
            <div class="subsystem" onclick="showDashboard('powertrain')">
                <i class="fas fa-cog"></i>
                <div>POWERTRAIN</div>
            </div>
            <div class="subsystem" onclick="showDashboard('suspension')">
                <i class="fas fa-car-battery"></i>
                <div>SUSPENSION</div>
            </div>
            <div class="subsystem" onclick="showDashboard('brakes')">
                <i class="fas fa-stopwatch"></i>
                <div>BRAKES</div>
            </div>
            <div class="subsystem" onclick="showDashboard('chassis')">
                <i class="fas fa-car"></i>
                <div>CHASSIS</div>
            </div>
            <div class="subsystem" onclick="showDashboard('electrical')">
                <i class="fas fa-bolt"></i>
                <div>ELECTRICAL</div>
            </div>
            <div class="subsystem" onclick="showDashboard('embedded')">
                <i class="fas fa-microchip"></i>
                <div>EMBEDDED</div>
            </div>
        </div>
    </div>

    <!-- POWERTRAIN DASHBOARD -->
    <div id="powertrain" class="dashboard">
        <button class="back-btn" onclick="showLanding()">← BACK</button>
        <h1>POWERTRAIN TELEMETRY</h1>
        <div class="sensors" id="powertrain-sensors">
            <!-- Live data here -->
        </div>
    </div>
