<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TEAM SAKTHI RACING | TELEMETRY</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* ===== THEME ===== */
:root{
--bg-black:#0c0c0f;
--bg-dark:#15151c;
--accent:#ff6a00;
--accent2:#00b3ff;
--text:#ffffff;
--glass:rgba(255,255,255,0.06);
--border:rgba(255,255,255,0.15);
}

/* ===== GLOBAL ===== */
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Rajdhani',sans-serif;
background:var(--bg-black);
color:var(--text);
overflow-x:hidden;
}

/* ===== LANDING ===== */
.landing{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:
linear-gradient(rgba(0,0,0,0.75),rgba(0,0,0,0.75)),
url('145.jpeg') center/cover no-repeat fixed;
padding:2rem;
}

.title{
font-family:'Orbitron',sans-serif;
font-size:3.8rem;
font-weight:900;
letter-spacing:2px;
margin-bottom:1rem;
}

.subtitle{
font-size:1.2rem;
opacity:0.8;
margin-bottom:2rem;
}

.enter{
padding:1rem 2.5rem;
border:2px solid var(--accent);
background:transparent;
color:white;
font-family:'Orbitron';
cursor:pointer;
transition:0.3s;
}

.enter:hover{
background:var(--accent);
}

/* ===== DASHBOARD ===== */
.dashboard{
display:none;
min-height:100vh;
padding:2rem;
background:linear-gradient(135deg,#14141a,#0c0c0f);
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:2rem;
flex-wrap:wrap;
}

.header h1{
font-family:'Orbitron';
font-size:2rem;
}

.back{
padding:0.6rem 1.2rem;
border:1px solid var(--border);
background:transparent;
color:white;
cursor:pointer;
}

/* ===== GRID ===== */
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:2rem;
}

.card{
background:var(--glass);
border:1px solid var(--border);
padding:1.5rem;
}

.card h3{
font-family:'Orbitron';
margin-bottom:1rem;
font-size:1rem;
letter-spacing:1px;
color:var(--accent2);
}

.value{
font-family:'Orbitron';
font-size:2.5rem;
color:var(--accent);
}

.chart{
height:300px;
}

canvas{
width:100% !important;
height:100% !important;
}

@media(max-width:900px){
.grid{grid-template-columns:1fr;}
.title{font-size:2.5rem;}
}

</style>
</head>
<body>

<!-- LANDING -->
<section class="landing" id="landing">
<h1 class="title">TEAM SAKTHI RACING</h1>
<p class="subtitle">Formula Student Telemetry Control System</p>
<button class="enter" onclick="openDashboard()">ENTER TELEMETRY</button>
</section>

<!-- DASHBOARD -->
<section class="dashboard" id="dashboard">
<div class="header">
<h1>POWERTRAIN TELEMETRY</h1>
<button class="back" onclick="goBack()">BACK</button>
</div>

<div class="grid">

<div class="card">
<h3>LAMBDA SENSOR</h3>
<div class="value" id="lambda">0.95</div>
</div>

<div class="card">
<h3>THROTTLE POSITION</h3>
<div class="value" id="tps">40%</div>
</div>

<div class="card chart">
<h3>LAMBDA TREND</h3>
<canvas id="lambdaChart"></canvas>
</div>

<div class="card chart">
<h3>TEMPERATURE TREND</h3>
<canvas id="tempChart"></canvas>
</div>

</div>
</section>

<script>

let lambdaChart,tempChart;
let time=[],lambdaData=[],tempData=[];

function openDashboard(){
document.getElementById("landing").style.display="none";
document.getElementById("dashboard").style.display="block";
initCharts();
startData();
}

function goBack(){
document.getElementById("dashboard").style.display="none";
document.getElementById("landing").style.display="flex";
}

function initCharts(){

lambdaChart=new Chart(document.getElementById("lambdaChart"),{
type:"line",
data:{
labels:[],
datasets:[{
label:"Lambda",
data:[],
borderColor:"#00b3ff",
tension:0.3
}]
},
options:{
responsive:true,
maintainAspectRatio:false,
plugins:{legend:{labels:{color:"white"}}},
scales:{
x:{ticks:{color:"white"}},
y:{ticks:{color:"white"},min:0.7,max:1.3}
}
}
});

tempChart=new Chart(document.getElementById("tempChart"),{
type:"line",
data:{
labels:[],
datasets:[{
label:"Engine Temp",
data:[],
borderColor:"#ff6a00",
tension:0.3
}]
},
options:{
responsive:true,
maintainAspectRatio:false,
plugins:{legend:{labels:{color:"white"}}},
scales:{
x:{ticks:{color:"white"}},
y:{ticks:{color:"white"},min:60,max:120}
}
}
});

}

function startData(){
setInterval(()=>{
let now=new Date().toLocaleTimeString();

let lambda=0.9+Math.random()*0.2;
let tps=Math.floor(Math.random()*100);
let temp=80+Math.random()*20;

document.getElementById("lambda").innerText=lambda.toFixed(2);
document.getElementById("tps").innerText=tps+"%";

time.push(now);
lambdaData.push(lambda);
tempData.push(temp);

if(time.length>15){
time.shift();lambdaData.shift();tempData.shift();
}

lambdaChart.data.labels=time;
lambdaChart.data.datasets[0].data=lambdaData;
lambdaChart.update();

tempChart.data.labels=time;
tempChart.data.datasets[0].data=tempData;
tempChart.update();

},2000);
}

</script>

</body>
</html>
