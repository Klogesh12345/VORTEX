<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAKTHI RACING | VORTEX PITWALL ⚡</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <style>
        :root {
            --black: #000000;
            --electric-blue: #00f0ff;
            --plasma-purple: #8b00ff;
            --fire-orange: #ff4500;
            --neon-green: #39ff14;
            --cyber-red: #ff073a;
            --glass: rgba(255,255,255,0.1);
            --glow-blue: 0 0 40px #00f0ff;
            --glow-purple: 0 0 40px #8b00ff;
            --glow-orange: 0 0 40px #ff4500;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: radial-gradient(circle at 20% 80%, #ff4500, transparent 50%),
                        radial-gradient(circle at 80% 20%, #00f0ff, transparent 50%),
                        radial-gradient(circle at 40% 40%, #8b00ff, transparent 50%),
                        #000;
            color: white;
            overflow-x: hidden;
            position: relative;
        }

        /* ANIMATED PARTICLE BACKGROUND */
        #particles-js {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        /* LOADING ANIMATION - CYBERPUNK STYLE */
        .loading {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #000;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 1000;
            animation: fadeOut 1s forwards 2.5s;
        }

        .glitch {
            font-family: 'Orbitron', monospace;
            font-size: clamp(3rem, 10vw, 6rem);
            font-weight: 900;
            color: #00f0ff;
            animation: glitch 1s infinite;
            text-shadow: var(--glow-blue), var(--glow-purple);
        }

        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }

        .scanline {
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #00f0ff, transparent);
            animation: scan 3s linear infinite;
        }

        @keyframes scan {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100vh); }
        }

        @keyframes fadeOut { to { opacity: 0; } }

        /* LANDING - HYPER F1 STYLE */
        .landing {
            height: 100vh;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .landing::before {
            content: '';
            position: absolute;
            inset: 0;
            background: 
                linear-gradient(45deg, rgba(0,0,0,0.8), rgba(139,0,255,0.3)),
                url('145.jpeg') center/cover fixed;
            z-index: -1;
            animation: zoomPulse 8s ease-in-out infinite;
        }

        @keyframes zoomPulse {
            0%, 100% { transform: scale(1); filter: brightness(0.7); }
            50% { transform: scale(1.05); filter: brightness(0.9); }
        }

        .hero-title {
            font-family: 'Orbitron', monospace;
            font-size: clamp(5rem, 15vw, 10rem);
            font-weight: 900;
            background: linear-gradient(45deg, #00f0ff, #8b00ff, #ff4500, #00f0ff);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1rem;
            animation: rainbow 3s ease infinite, shake 0.5s infinite;
            text-shadow: var(--glow-blue), var(--glow-purple), var(--glow-orange);
            filter: drop-shadow(0 0 60px #00f0ff);
        }

        @keyframes rainbow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-3px); }
            75% { transform: translateX(3px); }
        }

        .hero-subtitle {
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            background: linear-gradient(45deg, #39ff14, #ff073a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
            margin-bottom: 3rem;
            animation: pulseGlow 2s ease infinite;
            text-shadow: 0 0 30px #39ff14;
        }

        @keyframes pulseGlow {
            0%, 100% { filter: drop-shadow(0 0 20px #39ff14); }
            50% { filter: drop-shadow(0 0 40px #39ff14); }
        }

        /* HYPER BUTTON */
        .enter-btn {
            position: relative;
            font-family: 'Orbitron', monospace;
            font-size: clamp(1.2rem, 3vw, 1.8rem);
            font-weight: 800;
            padding: 2rem 4rem;
            background: linear-gradient(45deg, #00f0ff, #8b00ff);
            border: none;
            border-radius: 50px;
            color: #000;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 3px;
            overflow: hidden;
            animation: btnPulse 2s infinite;
            box-shadow: 
                0 0 50px #00f0ff,
                inset 0 0 50px rgba(255,255,255,0.2);
        }

        .enter-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: 0.7s;
        }

        .enter-btn:hover {
            animation: none;
            transform: scale(1.1) rotate(2deg);
            box-shadow: 
                0 0 100px #00f0ff,
                0 0 200px #8b00ff;
        }

        .enter-btn:hover::before { left: 100%; }

        @keyframes btnPulse {
            0%, 100% { box-shadow: 0 0 50px #00f0ff, inset 0 0 50px rgba(255,255,255,0.2); }
            50% { box-shadow: 0 0 80px #8b00ff, inset 0 0 80px rgba(255,255,255,0.3); }
        }

        /* SUBSYSTEMS - ELECTRIC GRID */
        .subsystems {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 2rem;
            max-width: 1200px;
            padding: 4rem 2rem;
            margin-top: 4rem;
        }

        .subsystem {
            background: linear-gradient(45deg, rgba(0,240,255,0.2), rgba(139,0,255,0.2));
            backdrop-filter: blur(20px);
            border: 2px solid #00f0ff;
            border-radius: 25px;
            padding: 3rem 1.5rem;
            text-align: center;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            box-shadow: var(--glow-blue);
        }

        .subsystem::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%; right: -50%; bottom: -50%;
            background: conic-gradient(from 0deg, transparent, #00f0ff, transparent);
            animation: spin 2s linear infinite;
            z-index: -1;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        .subsystem:hover {
            transform: translateY(-30px) scale(1.1) rotateX(10deg);
            box-shadow: 
                0 0 100px #00f0ff,
                0 0 200px #8b00ff,
                inset 0 0 50px rgba(255,255,255,0.3);
            border-color: #39ff14;
        }

        .subsystem i {
            font-size: 5rem;
            display: block;
            margin-bottom: 1.5rem;
            background: linear-gradient(45deg, #39ff14, #ff073a, #00f0ff);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: iconRainbow 4s ease infinite;
            filter: drop-shadow(0 0 30px #39ff14);
        }

        @keyframes iconRainbow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .subsystem-name {
            font-family: 'Orbitron', monospace;
            font-size: 1.5rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 4px;
            background: linear-gradient(45deg, #00f0ff, #39ff14);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* DASHBOARD - HYPERSPACE MODE */
        .dashboard {
            min-height: 100vh;
            padding: 4rem 2rem;
            background: 
                linear-gradient(45deg, #000, #1a0033, #000),
                radial-gradient(circle, rgba(139,0,255,0.3) 0%, transparent 70%);
            display: none;
            position: relative;
            overflow: hidden;
        }

        .dashboard::before {
            content: '';
            position: absolute;
            inset: 0;
            background: 
                repeating-linear-gradient(
                    45deg,
                    transparent,
                    transparent 2px,
                    rgba(0,240,255,0.03) 2px,
                    rgba(0,240,255,0.03) 4px
                );
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4rem;
            position: relative;
            z-index: 2;
        }

        .dashboard-title {
            font-family: 'Orbitron', monospace;
            font-size: clamp(3rem, 8vw, 5rem);
            font-weight: 900;
            background: linear-gradient(45deg, #00f0ff, #8b00ff, #ff4500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: titleRainbow 3s ease infinite;
            text-shadow: var(--glow-blue);
        }

        @keyframes titleRainbow {
            0% { background-position: 0% 50%; }
            100% { background-position: 400% 50%; }
        }

        .status-live {
            background: linear-gradient(45deg, #39ff14, #00f0ff);
            padding: 1.5rem 3rem;
            border-radius: 50px;
            backdrop-filter: blur(20px);
            border: 2px solid #39ff14;
            font-family: 'Orbitron', monospace;
            font-size: 1.2rem;
            font-weight: 800;
            box-shadow: 0 0 50px #39ff14;
            animation: livePulse 1s ease infinite;
        }

        @keyframes livePulse {
            0%, 100% { box-shadow: 0 0 50px #39ff14; }
            50% { box-shadow: 0 0 80px #39ff14, 0 0 120px #00f0ff; }
        }

        .sensors-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 3rem;
            margin-top: 3rem;
            position: relative;
            z-index: 2;
        }

        .sensor {
            background: linear-gradient(45deg, rgba(0,240,255,0.2), rgba(139,0,255,0.2));
            backdrop-filter: blur(30px);
            border: 2px solid #00f0ff;
            border-radius: 25px;
            padding: 3rem 2rem;
            text-align: center;
            position: relative;
            overflow: hidden;
            animation: float 6s ease-in-out infinite;
        }

        .sensor:nth-child(2) { animation-delay: -1s; }
        .sensor:nth-child(3) { animation-delay: -2s; }
        .sensor:nth-child(4) { animation-delay: -3s; }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        .sensor-value {
            font-family: 'Orbitron', monospace;
            font-size: clamp(4rem, 12vw, 6rem);
            font-weight: 900;
            background: linear-gradient(45deg, #39ff14, #ff073a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 1rem 0;
            animation: countUp 2s ease infinite;
        }

        @keyframes countUp {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .sensor-label {
            font-size: 1.3rem;
            color: #00f0ff;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 1rem;
            font-weight: 700;
        }

        .sensor-unit {
            font-size: 1.5rem;
            color: #39ff14;
            font-weight: 800;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .subsystems { grid-template-columns: 1fr 1fr; padding: 2rem 1rem; }
            .sensors-grid { grid-template-columns: 1fr; }
        }

        /* HIDE PAGES */
        [data-page] { display: none; }
        #landing { display: flex; }
    </style>
</head>
<body>
    <!-- PARTICLES -->
    <div id="particles-js"></div>

    <!-- LOADING -->
    <div class="loading" id="loading">
        <div class="glitch">VORTEX PITWALL</div>
        <div class="scanline"></div>
    </div>

    <!-- LANDING -->
    <section id="landing" data-page="landing" class="landing">
        <h1 class="hero-title">SAKTHI RACING</h1>
        <p class="hero-subtitle">HYPERSPACE TELEMETRY v2.0 ⚡ FS INDIA 2026</p>
        <button class="enter-btn" onclick="launchDashboard()">
            <i class="fas fa-rocket"></i> LAUNCH DASHBOARD
        </button>
        
        <div class="subsystems">
            <div class="subsystem" onclick="showPage('powertrain')">
                <i class="fas fa-cogs"></i>
                <div class="subsystem-name">POWERTRAIN</div>
            </div>
            <div class="subsystem" onclick="showPage('suspension')">
                <i class="fas fa-car-battery"></i>
                <div class="subsystem-name">SUSPENSION</div>
            </div>
            <div class="subsystem" onclick="showPage('brakes')">
                <i class="fas fa-stopwatch"></i>
                <div class="subsystem-name">BRAKES</div>
            </div>
            <div class="subsystem" onclick="showPage('chassis')">
                <i class="fas fa-car-side"></i>
                <div class="subsystem-name">CHASSIS</div>
            </div>
            <div class="subsystem" onclick="showPage('electrical')">
                <i class="fas fa-bolt"></i>
                <div class="subsystem-name">ELECTRICAL</div>
            </div>
            <div class="subsystem" onclick="showPage('embedded')">
                <i class="fas fa-microchip"></i>
                <div class="subsystem-name">EMBEDDED</div>
            </div>
        </div>
    </section>

    <!-- POWERTRAIN DASHBOARD -->
    <section id="powertrain" data-page="powertrain" class="dashboard">
        <div class="dashboard-header">
            <h1 class="dashboard-title">POWERTRAIN OVERDRIVE</h1>
            <div class="status-live">🔴 LIVE 1200Hz 🔴</div>
        </div>
        <div class="sensors-grid">
            <div class="sensor">
                <div class="sensor-label">LAMBDA</div>
                <div class="sensor-value" id="lambda">0.92</div>
                <div class="sensor-unit">AFR</div>
            </div>
            <div class="sensor">
                <div class="sensor-label">TPS</div>
                <div class="sensor-value" id="tps">42</div>
                <div class="sensor-unit">%</div>
            </div>
            <div class="sensor">
                <div class="sensor-label">ECT</div>
                <div class="sensor-value" id="ect">87</div>
                <div class="sensor-unit">°C</div>
            </div>
            <div class="sensor">
                <div class="sensor-label">RADIATOR</div>
                <div class="sensor-value" id="radiator">76</div>
                <div class="sensor-unit">°C</div>
            </div>
        </div>
    </section>

    <script>
        // Particles.js
        particlesJS('particles-js', {
            particles: {
                number: { value: 100 },
                color: { value: ['#00f0ff', '#8b00ff', '#ff4500', '#39ff14'] },
                shape: { type: 'circle' },
                opacity: { value: 0.5, random: true },
                size: { value: 3, random: true },
                move: { speed: 2 }
            },
            interactivity: {
                events: { onhover: { enable: true, mode: 'repulse' } }
            }
        });

        // Loading
        setTimeout(() => {
            document.getElementById('loading').style.display = 'none';
        }, 3000);

        // Navigation
        function launchDashboard() {
            document.querySelectorAll('[data-page]').forEach(p => p.style.display = 'none');
            document.getElementById('powertrain').style.display = 'block';
            startTelemetry();
        }

        function showPage(page) {
            document.querySelectorAll('[data-page]').forEach(p => p.style.display = 'none');
            document.getElementById(page).style.display = 'block';
        }

        // HYPER TELEMETRY
        function startTelemetry() {
            setInterval(() => {
                document.getElementById('lambda').textContent = (0.85 + Math.sin(Date.now() * 0.002) * 0.15).toFixed(2);
                document.getElementById('tps').textContent = Math.round(25 + Math.sin(Date.now() * 0.001) * 75);
                document.getElementById('ect').textContent = Math.round(78 + Math.sin(Date.now() * 0.0008) * 12);
                document.getElementById('radiator').textContent = Math.round(72 + Math.sin(Date.now() * 0.0009) * 10);
            }, 100);
        }
    </script>
</body>
</html>
