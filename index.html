<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Telemetry Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI;}

body{
background:#0b1220;
color:white;
scroll-behavior:smooth;
}

/* SIDEBAR */

.sidebar{
position:fixed;
left:0;
top:0;
height:100%;
width:220px;
background:#111827;
padding-top:40px;
}

.sidebar a{
display:flex;
align-items:center;
gap:10px;
padding:15px 20px;
color:#00e5ff;
text-decoration:none;
transition:0.3s;
font-size:15px;
}

.sidebar a:hover{
background:#1f2937;
color:#00ff88;
}

/* SECTIONS */

.section{
margin-left:220px;
padding:70px 40px;
min-height:100vh;
}

.hero{
position:relative;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
overflow:hidden;
}

.hero img{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
z-index:-1;
filter:brightness(0.4);
}

.hero-content{
text-align:center;
}

.hero h1{
font-size:50px;
color:#00e5ff;
}

/* CARDS */

.card{
background:#1f2937;
padding:25px;
margin-top:20px;
border-radius:10px;
}

canvas{
background:white;
margin-top:20px;
border-radius:8px;
}

.value-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
margin-top:15px;
}

.value-box{
background:#0b1220;
padding:12px;
border-radius:6px;
text-align:center;
}

.download-btn{
margin-top:15px;
padding:8px 15px;
background:#00e5ff;
border:none;
cursor:pointer;
}

/* FLOATING GRAPH PLOTTER */

.plotter{
position:fixed;
bottom:25px;
right:25px;
background:#00e5ff;
width:65px;
height:65px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
color:black;
font-size:22px;
cursor:pointer;
box-shadow:0 0 20px #00e5ff;
}
</style>
</head>

<body>

<div class="sidebar">
<a href="#home"><i class="fas fa-house"></i> Home</a>
<a href="#power"><i class="fas fa-engine"></i> Powertrain</a>
<a href="#suspension"><i class="fas fa-car-side"></i> Suspension</a>
<a href="#brakes"><i class="fas fa-stop"></i> Brakes</a>
<a href="#electrical"><i class="fas fa-bolt"></i> Electrical</a>
<a href="#embedded"><i class="fas fa-microchip"></i> Embedded</a>
</div>

<section id="home" class="section hero">
<img src="145.jpeg">
<div class="hero-content">
<h1>SAKTHI RACING TELEMETRY</h1>
</div>
</section>

<!-- POWERTRAIN -->
<section id="power" class="section">
<h2>Powertrain</h2>

<div class="card
