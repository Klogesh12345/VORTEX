<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sakthi Racing CV-49 Telemetry</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Orbitron', sans-serif;
}

body{
    background:#0b0f16;
    color:white;
    overflow-x:hidden;
}

/* HERO */

.hero{
    position:relative;
    height:100vh;
    width:100%;
    overflow:hidden;
}

/* BACKGROUND IMAGE */

.bg-image{
    position:absolute;
    width:100%;
    height:100%;
    object-fit:cover;
    top:0;
    left:0;
    z-index:-2;
}

/* DARK OVERLAY */

.overlay{
    position:absolute;
    width:100%;
    height:100%;
    background:linear-gradient(to bottom, rgba(0,0,0,0.7), rgba(0,0,0,0.95));
    z-index:-1;
}

/* TOP BAR */

.top-bar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:40px 60px;
}

.cv-badge{
    border:2px solid #ff8c00;
    border-radius:50px;
    padding:6px 18px;
    color:#ff8c00;
    font-weight:600;
}

.team-info{
    display:flex;
    gap:20px;
    align-items:center;
}

.best-lap span{
    font-size:13px;
    color:#aaa;
}

.best-lap h2{
    font-size:28px;
    font-weight:800;
}

/* MAIN */

.main{
    display:flex;
    justify-content:space-between;
    padding:0 60px;
    margin-top:40px;
}

.left{
    max-width:50%;
}

.car-number{
    font-size:160px;
    font-weight:800;
    color:#ff8c00;
    line-height:0.9;
}

.car-name{
    font-size:28px;
    margin-top:10px;
    letter-spacing:2px;
}

.category{
    color:#ff8c00;
    font-size:14px;
    margin-top:6px;
}

.speed{
    font-size:120px;
    margin-top:60px;
    font-weight:700;
}

/* TELEMETRY */

.telemetry{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:25px;
    width:40%;
}

.card{
    background:rgba(20,25,35,0.85);
    padding:25px;
    border-radius:15px;
    backdrop-filter:blur(10px);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-6px);
    box-shadow:0 0 25px rgba(255,140,0,0.3);
}

.card span{
    font-size:14px;
    color:#aaa;
}

.card h3{
    margin-top:10px;
    font-size:28px;
}

/* RPM BAR */

.rpm-section{
    position:absolute;
    bottom:40px;
    left:60px;
    right:60px;
}

.rpm-label{
    font-size:14px;
    margin-bottom:8px;
}

.rpm-bar{
    height:18px;
    width:100%;
    background:#222;
    border-radius:20px;
    overflow:hidden;
}

.rpm-fill{
    height:100%;
    width:70%;
    background:linear-gradient(to right, green, yellow, orange, red);
    border-radius:20px;
}
</style>
</head>

<body>

<div class="hero">

    <!-- IMAGE -->
    <img src="145.jpeg" class="bg-image">

    <!-- DARK OVERLAY -->
    <div class="overlay"></div>

    <div class="top-bar">
        <div class="team-info">
            <div class="cv-badge">CV</div>
            <div>
                <h3>SAKTHI RACING</h3>
                <p style="font-size:13px;color:#aaa;">FORMULA SAE – OPEN</p>
            </div>
        </div>

        <div class="best-lap">
            <span>BEST LAP</span>
            <h2>01:24.387</h2>
        </div>
    </div>

    <div class="main">

        <div class="left">
            <div class="car-number">49</div>
            <div class="car-name">CV-49 RACER</div>
            <div class="category">FORMULA SAE – OPEN</div>
            <div class="speed">67 km/h</div>
        </div>

        <div class="telemetry">
            <div class="card">
                <span>G-FORCE</span>
                <h3>1.8 G</h3>
            </div>

            <div class="card">
                <span>THROTTLE</span>
                <h3>78 %</h3>
            </div>

            <div class="card">
                <span>ENGINE TEMP</span>
                <h3>82 °C</h3>
            </div>

            <div class="card">
                <span>BATTERY</span>
                <h3>12.8 V</h3>
            </div>
        </div>

    </div>

    <div class="rpm-section">
        <div class="rpm-label">RPM</div>
        <div class="rpm-bar">
            <div class="rpm-fill"></div>
        </div>
    </div>

</div>

</body>
</html>
