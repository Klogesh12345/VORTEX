<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TEAM SAKTHI RACING | PITWALL</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* ===== CORE THEME ===== */
:root{
--black:#0b0b0f;
--dark:#14141a;
--accent:#ff5c00;
--blue:#00c2ff;
--green:#00ff88;
--red:#ff2e2e;
--white:#ffffff;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Rajdhani',sans-serif;
background:var(--black);
color:var(--white);
overflow-x:hidden;
}

/* ===== LANDING PAGE ===== */
.landing{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:
linear-gradient(rgba(0,0,0,0.75),rgba(0,0,0,0.75)),
url('145.jpeg') center/cover no-repeat fixed;
padding:2rem;
}

.title{
font-family:'Orbitron';
font-size:4rem;
font-weight:900;
letter-spacing:3px;
margin-bottom:1rem;
}

.subtitle{
font-size:1.2rem;
opacity:0.8;
margin-bottom:2rem;
}

.enter-btn{
padding:1rem 3rem;
border:2px solid var(--accent);
background:transparent;
color:white;
font-family:'Orbitron';
cursor:pointer;
transition:0.3s;
}

.enter-btn:hover{
background:var(--accent);
}

/* ===== PITWALL BAR ===== */
.pitwall{
position:fixed;
top:0;
width:100%;
background:#000;
display:flex;
justify-content:space-between;
padding:10px 20px;
font-family:'Orbitron';
font-size:0.9rem;
border-bottom:2px solid var(--accent);
z-index:1000;
}

.live{
color:var(--green);
animation:blink 1s infinite alternate;
}

@keyframes blink{
from{opacity:0.5;}
to{opacity:1;}
}

/* ===== DASHBOARD ===== */
.dashboard{
display:none;
padding:80px 2rem 2rem 2rem;
min-height:100vh;
background:linear-gradient(135deg,#15151a,#0b0b0f);
}

.section-title{
font-family:'Orbitron';
font-size:1.8rem;
margin-bottom:2rem;
}

/* ===== GRID ===== */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:2rem;
}

.card{
background:#111;
border:1px solid #222;
padding:1.5rem;
}

.card h3{
font-family:'Orbitron';
font-size:0.9rem;
color:var(--blue);
margin-bottom:0.5rem;
}

.value{
font-family:'Orbitron';
font-size:2.8rem;
color:var(--accent);
}

.chart{
height:300px;
}

canvas{
width:100%!important;
height:100%!important;
}

/* ===== ALERT ===== */
.alert{
margin-top:1rem;
font-family:'Orbitron';
font-size:0.9rem;
}

.warning{color:var(--accent);}
.critical{color:var(--red);}

</style>
</head>
<body>

<!-- LANDING -->
<section class="landing" id="landing">
<h1 class="title">TEAM SAKTHI RACING</h1>
<p class="subtitle">FORMULA STUDENT TELEMETRY CONTROL SYSTEM</p>
<button class="enter-btn" onclick="startSystem()">ENTER PITWALL</button>
</section>

<!-- PITWALL BAR -->
<div class="pitwall" id="pitwall" style="display:none;">
<div>TSR PITWALL</div>
<div id="speed">SPD: 0 km/h</div>
<div id="rpm">RPM: 0</div>
<div id="gforce">G: 0.0</div>
<div class="live">● LIVE</div>
</div>

<!-- DASHBOARD -->
<section class="dashboard" id="dashboard">

<h2 class="section-title">POWERTRAIN TELEMETRY</h2>

<div class="grid">

<div class="card">
<h3>LAMBDA</h3>
<div class="value" id="lambda">0.95</div>
<div class="alert" id="lambdaAlert"></div>
</div>

<div class="card">
<h3>ENGINE TEMP (°C)</h3>
<div class="value" id="temp">85</div>
<div class="alert" id="tempAlert"></div>
</div>

<div class="card chart">
<h3>LAMBDA TREND</h3>
<canvas id="lambdaChart"></canvas>
</div>

<div class="card chart">
<h3>TEMP TREND</h3>
<canvas id="tempChart"></canvas>
</div>

</div>

</section>

<script>

let lambdaChart,tempChart;
let time=[],lambdaData=[],tempData=[];

function startSystem(){
document.getElementById("landing").style.display="none";
document.getElementById("dashboard").style.display="block";
document.getElementById("pitwall").style.display="flex";
initCharts();
runTelemetry();
}

function initCharts(){

lambdaChart=new Chart(document.getElementById("lambdaChart"),{
type:"line",
data:{labels:[],datasets:[{
label:"Lambda",
data:[],
borderColor:"#00c2ff",
tension:0.3
}]},
options:{
responsive:true,
maintainAspectRatio:false,
plugins:{legend:{labels:{color:"white"}}},
scales:{
x:{ticks:{color:"white"}},
y:{min:0.7,max:1.3,ticks:{color:"white"}}
}
}
});

tempChart=new Chart(document.getElementById("tempChart"),{
type:"line",
data:{labels:[],datasets:[{
label:"Temp",
data:[],
borderColor:"#ff5c00",
tension:0.3
}]},
options:{
responsive:true,
maintainAspectRatio:false,
plugins:{legend:{labels:{color:"white"}}},
scales:{
x:{ticks:{color:"white"}},
y:{min:60,max:120,ticks:{color:"white"}}
}
}
});

}

function runTelemetry(){

setInterval(()=>{

let now=new Date().toLocaleTimeString();
let lambda=0.9+Math.random()*0.25;
let temp=80+Math.random()*30;
let rpm=3000+Math.random()*5000;
let speed=50+Math.random()*100;
let g=(Math.random()*2).toFixed(2);

document.getElementById("lambda").innerText=lambda.toFixed(2);
document.getElementById("temp").innerText=Math.round(temp);
document.getElementById("rpm").innerText="RPM: "+Math.round(rpm);
document.getElementById("speed").innerText="SPD: "+Math.round(speed)+" km/h";
document.getElementById("gforce").innerText="G: "+g;

/* WARNINGS */
let lambdaAlert=document.getElementById("lambdaAlert");
if(lambda>1.1){
lambdaAlert.innerText="LEAN MIXTURE WARNING";
lambdaAlert.className="alert warning";
}else{
lambdaAlert.innerText="";
}

let tempAlert=document.getElementById("tempAlert");
if(temp>105){
tempAlert.innerText="ENGINE OVERHEAT";
tempAlert.className="alert critical";
}else{
tempAlert.innerText="";
}

time.push(now);
lambdaData.push(lambda);
tempData.push(temp);

if(time.length>20){
time.shift();lambdaData.shift();tempData.shift();
}

lambdaChart.data.labels=time;
lambdaChart.data.datasets[0].data=lambdaData;
lambdaChart.update();

tempChart.data.labels=time;
tempChart.data.datasets[0].data=tempData;
tempChart.update();

},2000);

}

</script>

</body>
</html>
